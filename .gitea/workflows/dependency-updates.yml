name: Dependency updates
run-name: Weekly dependency update by ${{ gitea.actor }} 📦
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    uses: https://git.janhouse.lv/janhouse/gitea-pnpm-deps-update/.gitea/workflows/run.yml@c5d1654e15454d56af8609633fdb86ded9356804
    with:
      base-branch: main
      monitor-ci: true
    secrets:
      BOT_TOKEN: ${{ secrets.DEPS_BOT_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}

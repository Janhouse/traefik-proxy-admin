[install]
# Refuse to install npm package versions younger than this many seconds.
# 604800 = 7 days. Mitigates supply-chain attacks where a compromised
# maintainer publishes a malicious version: a 7-day cool-down gives the
# ecosystem time to spot and yank bad releases before we pull them in.
# Bun uses seconds (npm uses days, pnpm uses minutes).
minimumReleaseAge = 604800

# Add internal/trusted scopes here if any need to bypass the gate.
# minimumReleaseAgeExcludes = ["@yourorg/internal"]

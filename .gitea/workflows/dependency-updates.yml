name: Dependency updates
run-name: Weekly dependency update by ${{ gitea.actor }} 📦
on:
  schedule:
    - cron: '50 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    uses: https://git.janhouse.lv/janhouse/gitea-pnpm-deps-update/.gitea/workflows/run.yml@b1795c4ff9d11cd7dd1ec3e2df6e82e414dc7453
    with:
      base-branch: main
      pnpm-version: '10'
      monitor-ci: true
    secrets:
      BOT_TOKEN: ${{ secrets.DEPS_BOT_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
